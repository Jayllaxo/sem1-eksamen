<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="script-til-funktioner.js" defer></script>
  <link rel="stylesheet" href="produkt-eksamen-css.css">
  <title>Gangster-test tjekliste test</title>
</head>
<body>

<button onclick="toggleColorblind()" class="colorblind-knap">
  Farveblind Tilstand
</button>

<p>
  <a href="gangster-test-tjekliste-1.html" class="tilbage-knap">←</a>
</p>

<div class="container">
  <p class="overtitel" style="margin-bottom: 30px">Tjekliste</p>

  <ul class="undertitel" style="list-style: none">
    <li style="margin: 10px">
      <label>
        <input type="checkbox" style="transform: scale(1.5)">
        Fortæl brugeren om hjemmesiden og dens formål.
      </label>
    </li>
    <li style="margin: 10px">
      <label>
        <input type="checkbox" style="transform: scale(1.5)">
        Gør brugeren opmærksom på, at de godt må snakke. Dog ikke nødvendigt.
      </label>
    </li>
    <li style="margin: 10px">
      <label>
        <input type="checkbox" style="transform: scale(1.5)">
        Vigtigt at sætte brugeren ind et tilfældigt sted på hjemmesiden ved hver test.
      </label>
    </li>
    <li style="margin: 10px">
      <label>
        <input type="checkbox" style="transform: scale(1.5)">
        Giv brugeren navigations opgaver for at teste, hvorvidt de kan finde rundt.
      </label>
    </li>
    <li style="margin: 10px">
      <label>
        <input type="checkbox" style="transform: scale(1.5)">
        Når du har testet, hvad du ville, så tak brugeren og afslut testen.
      </label>
    </li>
  </ul>

  <a href="læs-op.html" class="gul-knap">Tilbage til start</a>
</div>

</body>
</html>
