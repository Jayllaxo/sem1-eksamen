<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="script-til-funktioner.js" defer></script>
  <link rel="stylesheet" href="produkt-eksamen-css.css">
  <title>Quiz</title>
</head>
<body>

<div>
  <button onclick="toggleColorblind()" class="colorblind-knap">
    Farveblind Tilstand
  </button>
  <a href="quiz-startside.html" class="tilbage-knap">←</a>
</div>

<div class="container">
  <div id="quiz-screen">
    <h1 id="question" class="overtitel"></h1>

    <div id="answers">
      <button class="answer" data-option="A"></button>
      <button class="answer" data-option="B"></button>
      <button class="answer" data-option="C"></button>
      <button class="answer" data-option="D"></button>
    </div>

    <button id="next-btn">Næste</button>
  </div>

  <div id="result-screen" class="hidden">
    <p class="overtitel">Dit resultat</p>
    <p class="undertitel" id="score-text"></p>
    <button class="grøn-knap" style="border: none" onclick="location.reload()">Prøv igen?</button>
    <a href="test-din-viden.html" class="gul-knap" style="margin-top: 20px">Tilbage til start</a>
  </div>
</div>

</body>
</html>
