<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="produkt-eksamen-css.css">
  <title>Think-out-loud tjekliste test</title>
</head>
<body>

<p>
  <a href="think-out-loud-tjekliste-1.html" class="tilbage-knap">←</a>
</p>

<div class="container">
  <p class="overtitel" style="margin-bottom: 30px">Tjekliste</p>

    <ul class="undertitel" style="list-style: none">
        <li style="margin: 10px">
            <label>
                <input type="checkbox" style="transform: scale(1.5)">
                Sørg for at brugeren er tryg og tilpas.
            </label>
        </li>
        <li style="margin: 10px">
            <label>
                <input type="checkbox" style="transform: scale(1.5)">
                Fortæl brugeren, at det er vigtigt, at de tænker højt, imens de tilgår hjemmesiden.
            </label>
        </li>
        <li style="margin: 10px">
            <label>
                <input type="checkbox" style="transform: scale(1.5)">
                Giv brugeren forskellige opgaver til at teste hjemmeside funktioner og observér.
            </label>
        </li>
        <li style="margin: 10px">
            <label>
                <input type="checkbox" style="transform: scale(1.5)">
                Interager kun med brugeren, hvis brugeren ikke tænker højt ved at huske dem på det.
            </label>
        </li>
        <li style="margin: 10px">
            <label>
                <input type="checkbox" style="transform: scale(1.5)">
                Når du har testet, hvad du ville, så tak brugeren og afslut testen.
            </label>
        </li>
    </ul>

  <a href="læs-op.html" class="gul-knap">Tilbage til start</a>
</div>

</body>
</html>
